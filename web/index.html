<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hollow Men Performer View</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="stats-hud">
        OSC: <span id="osc-val">0</span> m/s &nbsp;|&nbsp; GPU: <span id="gpu-val">0</span> fps
    </div>

    <div id="video-container"></div>

    <div id="performance-footer">
        <div class="footer-content">
            <div id="event-num">0</div>
            
            <div class="gesture-item">
                <span class="label">Current Gesture</span>
                <span id="curr-g-val" class="value">--</span>
            </div>
            
            <div class="gesture-item">
                <span class="label">Next Gesture</span>
                <span id="next-g-val" class="value" style="color: #f0f;">--</span>
            </div>

            <div class="gesture-item">
                <span class="label">Extra Info</span>
                <span id="extra-info-val" class="value">--</span>
            </div>
        </div>
    </div>

<script>
    function connectWebSocket() {
        // Automatically build the WS URL based on the current host
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const ws = new WebSocket(`${protocol}//${window.location.host}/performance_instruction`);

        ws.onmessage = (event) => {
            const d = JSON.parse(event.data);
            
            document.getElementById('event-num').innerText = d.event;
            document.getElementById('curr-g-val').innerText = (d.current || "IDLE").replace(/_/g, " ");
            document.getElementById('next-g-val').innerText = (d.next || "END").replace(/_/g, " ");
            document.getElementById('extra-info-val').innerText = d.extra_info || "--";
            
            document.getElementById('osc-val').innerText = Math.round(d.mps_osc);
            document.getElementById('gpu-val').innerText = Math.round(d.fps_gpu);

            // DYNAMIC LAYOUT SNAP
            const container = document.getElementById('video-container');
            const activeIds = (d.active_videos || []).map(String); 

            // 1. Remove inactive cells
            Array.from(container.children).forEach(cell => {
                if (!activeIds.includes(cell.dataset.id)) {
                    cell.remove();
                }
            });

            // 2. Create new cells
            activeIds.forEach(id => {
                if (!document.querySelector(`.video-cell[data-id="${id}"]`)) {
                    const cell = document.createElement('div');
                    cell.className = 'video-cell';
                    cell.dataset.id = id;

                    const img = document.createElement('img');
                    img.className = 'stream-img';
                    
                    // With MJPEG, you just point the src at the endpoint once.
                    // The browser takes over and continuously updates the image.
                    img.src = `/video/${id}`;

                    // Simple recovery: if the server reboots, the stream will break.
                    // This attempts to reconnect the stream every 1 second.
                    img.onerror = () => {
                        console.warn(`Stream ${id} disconnected. Attempting reconnect...`);
                        setTimeout(() => {
                            img.src = `/video/${id}?retry=${Date.now()}`;
                        }, 1000);
                    };

                    cell.appendChild(img);
                    container.appendChild(cell);
                }
            });
        };

        // Auto-Reconnect if the Python server restarts
        ws.onclose = () => setTimeout(connectWebSocket, 1000);
    }

    connectWebSocket();
</script>
</body>
</html>
