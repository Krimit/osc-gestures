<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hollow Men Performer View</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="stats-hud">
        OSC: <span id="osc-val">0</span> m/s &nbsp;|&nbsp; GPU: <span id="gpu-val">0</span> fps
    </div>

    <div id="video-container"></div>

    <div id="performance-footer">
        <div class="footer-content">
            <div id="event-num">0</div>
            
            <div class="gesture-item">
                <span class="label">Current Gesture</span>
                <span id="curr-g-val" class="value">--</span>
            </div>
            
            <div class="gesture-item">
                <span class="label">Next Gesture</span>
                <span id="next-g-val" class="value" style="color: #f0f;">--</span>
            </div>
        </div>
    </div>

<script>
    async function update() {
        try {
            const r = await fetch('/api/status');
            const d = await r.json();
            
            document.getElementById('event-num').innerText = d.event;
            document.getElementById('curr-g-val').innerText = (d.current || "IDLE").replace(/_/g, " ");
            document.getElementById('next-g-val').innerText = (d.next || "END").replace(/_/g, " ");
            document.getElementById('osc-val').innerText = Math.round(d.mps_osc);
            document.getElementById('gpu-val').innerText = Math.round(d.fps_gpu);

            // DYNAMIC LAYOUT SNAP
            const container = document.getElementById('video-container');

            // Safely grab the array sent by the Python backend (e.g., ["0", "1"])
            const activeIds = (d.active_videos || []).map(String); 

            // 1. Remove cells from the screen if the server says they are no longer active
            Array.from(container.children).forEach(cell => {
                if (!activeIds.includes(cell.dataset.id)) {
                    cell.remove();
                }
            });

            // 2. Create new cells for active streams not yet rendered
            activeIds.forEach(id => {
                if (!document.querySelector(`.video-cell[data-id="${id}"]`)) {
                    const cell = document.createElement('div');
                    cell.className = 'video-cell';
                    cell.dataset.id = id;

                    const img = document.createElement('img');
                    img.className = 'stream-img';
                    
                    // PULL LOGIC: Fetch next frame on success
                    img.onload = () => {
                        // STOP if the cell was removed from the screen (fixes the memory leak)
                        if (!img.isConnected) return; 
                        
                        // Pace the requests to ~30fps to avoid flooding your local router
                        setTimeout(() => {
                            img.src = `/video/${id}?t=${Date.now()}`;
                        }, 33); 
                    };

                    // RECOVERY LOGIC: Try again if the network drops (fixes the silent death)
                    img.onerror = () => {
                        if (!img.isConnected) return;
                        console.warn(`Connection to stream ${id} dropped. Retrying...`);
                        setTimeout(() => {
                            img.src = `/video/${id}?t=${Date.now()}`;
                        }, 500);
                    };

                    // Kick off the first request
                    img.src = `/video/${id}?t=${Date.now()}`;
                    
                    cell.appendChild(img);
                    container.appendChild(cell);
                }
            });
        } catch(e) {
            // Silently catch network drops
        }
        setTimeout(update, 100);
    }
    
    // Start the loop, which is managed internally by the update method
    update()
</script>
</body>
</html>
